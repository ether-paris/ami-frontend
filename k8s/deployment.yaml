apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ether
  name: ami-frontend
  labels:
    app: ami-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ami-frontend
  template:
     metadata:
       labels:
         app: ami-frontend
     spec:
       nodeSelector:
         role: worker
       imagePullSecrets:
         - name: ghcr-secret
       volumes:
         - name: data-volume
           persistentVolumeClaim:
             claimName: ami-data-pvc
       containers:
         - name: frontend
           image: ghcr.io/ether-paris/ami-frontend:latest
           imagePullPolicy: Always
           ports:
             - name: http
               containerPort: 80
           readinessProbe:
             httpGet:
               path: /
               port: http
             initialDelaySeconds: 10
             periodSeconds: 10
           livenessProbe:
             httpGet:
               path: /
               port: http
             initialDelaySeconds: 30
             periodSeconds: 30
           env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "80"
            - name: HOST
              value: "0.0.0.0"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GROQ_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: OPENROUTER_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GOOGLE_API_KEY
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: MISTRAL_API_KEY
            - name: VITE_GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: VITE_GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GOOGLE_OAUTH_API_KEY
            - name: GOOGLE_OAUTH_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GOOGLE_OAUTH_AUTH_SECRET
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: AUTH_SECRET
            - name: DOMAIN
              value: "ami.ether.paris"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
