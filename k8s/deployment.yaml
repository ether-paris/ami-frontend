apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ether
  name: ami-frontend
  labels:
    app: ami-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ami-frontend
  template:
    metadata:
      labels:
        app: ami-frontend
    spec:
      nodeSelector:
        role: worker
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/ether-paris/ami-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GROQ_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: OPENROUTER_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GOOGLE_API_KEY
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: MISTRAL_API_KEY
            - name: VITE_GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: VITE_GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GOOGLE_OAUTH_API_KEY
            - name: GOOGLE_OAUTH_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ami-secrets
                  key: GOOGLE_OAUTH_AUTH_SECRET
